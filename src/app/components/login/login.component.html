<div class="login-page">
  <div class="left-panel">
    <div class="brand">
      <i class="pi pi-users brand-icon"></i>
      <h1>EmpDash</h1>
      <p>Manage your team efficiently</p>
    </div>
    <div class="features">
      <div class="feature-item">
        <i class="pi pi-chart-bar"></i>
        <span>Real-time Analytics</span>
      </div>
      <div class="feature-item">
        <i class="pi pi-shield"></i>
        <span>Secure & Reliable</span>
      </div>
      <div class="feature-item">
        <i class="pi pi-users"></i>
        <span>Team Management</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="login-card">
      <h2>Welcome Back!</h2>
      <p class="subtitle">Sign in to continue to EmpDash</p>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="pi pi-envelope"></i>
          <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email"/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="pi pi-lock"></i>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password"/>
        </div>
      </div>

      @if(error) {
        <div class="error-msg">
          <i class="pi pi-exclamation-triangle"></i> {{ error }}
        </div>
      }

      <button class="btn-login" (click)="onLogin()">
        <span>Sign In</span>
        <i class="pi pi-arrow-right"></i>
      </button>

      <div class="divider"><span>Demo Credentials</span></div>

      <div class="demo-box">
        <div><i class="pi pi-envelope"></i> admin&#64;company.com</div>
        <div><i class="pi pi-key"></i> admin123</div>
      </div>
    </div>
  </div>
</div>
