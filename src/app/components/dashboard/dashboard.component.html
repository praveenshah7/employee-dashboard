<div class="dashboard">
  <h1>Dashboard</h1>
  <div class="stats-grid">
    <div class="stat-card blue">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <h3>{{ totalEmployees }}</h3>
        <p>Total Employees</p>
      </div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">✅</div>
      <div class="stat-info">
        <h3>{{ activeEmployees }}</h3>
        <p>Active Employees</p>
      </div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon">🏢</div>
      <div class="stat-info">
        <h3>{{ departments }}</h3>
        <p>Departments</p>
      </div>
    </div>
    <div class="stat-card orange">
      <div class="stat-icon">💰</div>
      <div class="stat-info">
        <h3>₹{{ avgSalary | number }}</h3>
        <p>Avg Salary</p>
      </div>
    </div>
  </div>
</div>
